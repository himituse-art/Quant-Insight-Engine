kind = "web"
previewPath = "/"
title = "Quant Stock Platform"
version = "1.0.0"
id = "artifacts/quant-stocks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23256

[services.development]
run = "pnpm --filter @workspace/quant-stocks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quant-stocks", "run", "build" ]
publicDir = "artifacts/quant-stocks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23256"
BASE_PATH = "/"
